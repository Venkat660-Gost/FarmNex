<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        body { text-align: center; font-family: Arial; }
        input { padding: 10px; margin: 8px; }
        button { padding: 10px; background: green; color: white; }
    </style>
</head>

<body>

<h2>🔐 Login</h2>

<input type="text" id="phone" placeholder="Phone Number"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBt4TGIfyclYiK-Dl8du_PSfkd0IokuQ8s",
    authDomain: "raita-sahayaka.firebaseapp.com",
    projectId: "raita-sahayaka",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function login() {
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    if (phone === "" || password === "") {
        alert("Fill all fields ❌");
        return;
    }

    db.collection("users")
    .where("phone", "==", phone)
    .where("password", "==", password)
    .get()
    .then((result) => {
        if (!result.empty) {
            alert("Login Successful ✅");
            window.location.href = "FarmerDas.html";
        } else {
            alert("Invalid phone or password ❌!. Please register");
        }
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
