<!DOCTYPE html>
<html>
<head>
    <title>Designer Login</title>
    <style>
        body { font-family:Arial; background:#fff3e0; text-align:center; padding-top:100px; }
        .box {
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        input { width:90%; padding:8px; margin:8px; }
        button { padding:8px 15px; background:#ef6c00; color:white; border:none; border-radius:5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🧑‍💼 ADMIN Login</h2>
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    if(document.getElementById("adminPass").value === "admin123"){
        window.location.href="admin_panal.html";
    } else {
        alert("Wrong Password");
    }
}
</script>

</body>
</html>
