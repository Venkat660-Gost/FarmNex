<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        body { text-align: center; font-family: Arial; }
        input { padding: 10px; margin: 8px; }
        button { padding: 10px; background: green; color: white; }
    </style>
</head>

<body>

<h2>🌾 FarmNex Register</h2>

<input type="text" id="name" placeholder="Name"><br>
<input type="text" id="phone" placeholder="Phone Number"><br>
<input type="password" id="password" placeholder="Password"><br>
<input type="password" id="confirm" placeholder="Confirm Password"><br>

<button onclick="register()">Register</button>

<p>Already registered? <a href="loginpage.html">Login here</a></p>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBt4TGIfyclYiK-Dl8du_PSfkd0IokuQ8s",
    authDomain: "raita-sahayaka.firebaseapp.com",
    projectId: "raita-sahayaka",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function register() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if (name === "" || phone === "" || password === "" || confirm === "") {
        alert("Fill all fields ❌");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match ❌");
        return;
    }

    // Save to Firestore
    db.collection("users").add({
        name: name,
        phone: phone,
        password: password
    })
    .then(() => {
        alert("Registered Successfully ✅");
        window.location.href = "loginpage.html";
    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
