<body>

<h2>🌤 Weather App</h2>

<input type="text" id="city" placeholder="Enter city name">
<button onclick="getWeather()">Check Weather</button>

<div id="result"></div>

<script>
function getWeather() {
    let city = document.getElementById("city").value;

    let apiKey = "84b79bf2a1e6fa30bfdf1598e634c2b6";

    let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

    fetch(url)
    .then(response => response.json())
    .then(data => {
        if (data.cod === "404") {
            document.getElementById("result").innerHTML = "❌ City not found";
            return;
        }

        let temp = data.main.temp;
        let humidity = data.main.humidity;
        let weather = data.weather[0].description;

        document.getElementById("result").innerHTML = `
            🌍 City: ${city} <br>
            🌡 Temperature: ${temp}°C <br>
            💧 Humidity: ${humidity}% <br>
            ☁ Condition: ${weather}
        `;
    })
    .catch(error => {
        document.getElementById("result").innerHTML = "⚠ Error fetching data";
    });
}
</script>
<!-- ✅ TRANSLATION SCRIPT -->
<script>
function translatePage(lang) {
    if (lang === "en") {
        location.reload();
        return;
    }

    let elements = document.querySelectorAll("h1, h3, p, a, span, button");

    elements.forEach(el => {
        let text = el.innerText;

        if (text.trim() !== "") {
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${lang}`)
            .then(res => res.json())
            .then(data => {
                if (data.responseData) {
                    el.innerText = data.responseData.translatedText;
                }
            })
            .catch(err => console.log(err));
        }
    });

    // translate placeholder separately
    let input = document.querySelector("input");
    if (input) {
        fetch(`https://api.mymemory.translated.net/get?q=Search&langpair=en|${lang}`)
        .then(res => res.json())
        .then(data => {
            input.placeholder = data.responseData.translatedText;
        });
    }
}
</script>
